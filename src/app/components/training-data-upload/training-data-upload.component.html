<div class="upload-container">
  <h2>Training Data Upload</h2>
  
  <form (ngSubmit)="onSubmit()">
    <!-- File Upload Section -->
    <div class="form-group">
      <label for="file">Select File (Excel):</label>
      <div class="file-input-wrapper">
        <input 
          type="file" 
          id="file" 
          (change)="onFileSelected($event)"
          accept=".xlsx,.xls"
          [disabled]="isLoading()"
        />
        <span class="file-name">{{ fileName }}</span>
      </div>
    </div>

    <!-- Company Input -->
    <div class="form-group">
      <label for="company">Company:</label>
      <input 
        type="text" 
        id="company" 
        [(ngModel)]="company"
        name="company"
        placeholder="Enter company name (e.g., AKL)"
        [disabled]="isLoading()"
      />
    </div>

    <!-- Month Year Input -->
    <div class="form-group">
      <label for="monthYear">Month and Year:</label>
      <input 
        type="month" 
        id="monthYear" 
        [(ngModel)]="monthYear"
        name="monthYear"
        placeholder="YYYY-MM"
        [disabled]="isLoading()"
      />
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage()" class="alert alert-error">
      {{ errorMessage() }}
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage()" class="alert alert-success">
      {{ successMessage() }}
    </div>

    <!-- Submit Button -->
    <button 
      type="submit" 
      [disabled]="isLoading()"
      class="btn btn-primary"
    >
      <span *ngIf="!isLoading()">Upload</span>
      <span *ngIf="isLoading()">Uploading...</span>
    </button>
  </form>
</div>
